// localStorage wrapper to replace window.storage
const storage = {
  async get(key) {
    try {
      const value = localStorage.getItem(key);
      return value ? { value } : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
      return { key, value };
    } catch (e) { return null; }
  }
};

function cardId(c,i){ return `${c.category}||${c.type}||${c.set}||${c.num}||${i}`; }

function getInitData(card) {
  // If no Condition, still populate fields from init data
  const owned = card.condition ? !["Buy","Receive"].includes(card.condition) : false;
  const condition = card.condition && CONDITIONS.includes(card.condition) ? card.condition : "";
  return { 
    owned, 
    condition, 
    price: card.price||"", 
    note: card.note||"",
    name: card.name||"", 
    url: card.url||"",
    releaseDate: card.releaseDate||"", 
    illustration: card.illustration||"" 
  };
}

// ─── Photo sources helper — supports photo as string OR {key:filename} object ─
function getPhotoSrcs(card) {
  const base = card.sub ? `./${card.category}/${card.sub}` : `./${card.category}`;
  if (typeof card.photo === 'string') {
    return card.photo ? [`${base.toLowerCase()}/${card.photo.toLowerCase()}.png`] : [];
  } else if (card.photo && typeof card.photo === 'object') {
    return Object.values(card.photo).map(v => `${base.toLowerCase()}/${v.toLowerCase()}.png`);
  }
  return [];
}

// ─── User-uploaded photos helper — normalises stored value (string or string[]) ─
function getUserPhotoSrcs(userPhoto) {
  if (!userPhoto) return [];
  if (Array.isArray(userPhoto)) return userPhoto;
  return [userPhoto]; // backward-compat with old single-string storage
}

function CardTile({ card, cardData, userPhoto, onOpen, onSave, isDragging, hidePrices, hideGrayOut }) {
  const ts = TYPE_STYLE[card.type] || TYPE_STYLE.Regular;
  const owned = cardData?.owned ?? card.owned;
  const condition = cardData?.condition || card.condition;
  const name = cardData?.name || card.name || "";
  const url = cardData?.url || "";
  const [hovered, setHovered] = useState(false);
  const [photoIdx, setPhotoIdx] = useState(0);
  const [slideDir, setSlideDir] = useState(1);   // 1 = slide in from right (next), -1 = from left (prev)
  const tileRef = useRef(null);
  const photoImgRef = useRef(null);
  const isFirstPhotoRender = useRef(true);
  useLayoutEffect(()=>{
    if(isFirstPhotoRender.current){isFirstPhotoRender.current=false;return;}
    const el=photoImgRef.current;
    if(!el)return;
    const animName=slideDir>0?'photoSlideInRight':'photoSlideInLeft';
    el.style.animation='none';
    void el.offsetWidth;
    el.style.animation=`${animName} 0.28s ease`;
  },[photoIdx]);
  const isRevHolo = card.type === "Rev Holo";

  // Use illustration to determine which photo to show
  const illustrationKey = cardData?.illustration !== undefined ? cardData.illustration : card.illustration;
  // Merge built-in sources (minus any the user deleted) + user-uploaded photos
  const hiddenBuiltinPhotos = new Set(cardData?.hiddenBuiltinPhotos || []);
  const photoSrcs = [...getPhotoSrcs(card).filter(s=>!hiddenBuiltinPhotos.has(s)), ...getUserPhotoSrcs(userPhoto)];
  const photo = photoSrcs[photoIdx] || null;
  const condColor = condition ? COND_COLORS[condition] : null;
  const condBg = condition ? COND_BG[condition] : null;
  const condBorder = condition ? COND_BORDER[condition] : null;
  const displayLabel = name || card.set;

  const labelEl = url
    ? <a href={url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
        style={{color:"#1d4ed8",textDecoration:"none",fontSize:"0.88rem",fontWeight:800,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block",lineHeight:1.2}}
        onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"}
        onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>
        {displayLabel}
      </a>
    : <div style={{fontSize:"0.88rem",fontWeight:800,color:"#0f172a",fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.2}}>{displayLabel}</div>;

  return (
    <div ref={tileRef}
      onMouseEnter={()=>setHovered(true)}
      onMouseLeave={()=>setHovered(false)}
      onClick={(e)=>{
        if(e.ctrlKey || e.metaKey){
          e.stopPropagation();
          const isOrdered = cardData?.condition === "Ordered";
          onSave(card._id,{condition:isOrdered?"":"Ordered"});
        }else if(e.shiftKey && onSave){
          e.stopPropagation();
          onSave(card._id,{owned:!owned});
        }else{
          onOpen(card);
        }
      }}
      style={{
        cursor:"pointer",borderRadius:14,overflow:"hidden",
        background:"#ffffff",
        border:`2.5px solid ${owned?ts.accent:hovered?ts.accent+"88":card.sub?ts.accent+"55":ts.border}`,
        transition:"transform 0.17s ease,box-shadow 0.17s ease,border-color 0.17s ease",
        transform:isDragging?"scale(1.07) rotate(1.5deg)":hovered?"translateY(-6px) scale(1.02)":"none",
        boxShadow:isDragging?`0 24px 48px rgba(0,0,0,0.2),0 0 0 3px ${ts.accent}`
          :owned?`0 6px 24px ${ts.accent}44`
          :hovered?"0 10px 32px rgba(0,0,0,0.14)":"0 2px 8px rgba(0,0,0,0.06)",
        position:"relative",
        opacity: (owned||hideGrayOut)?1:0.82,
      }}>
      {owned && (
        <div style={{position:"absolute",top:8,right:8,zIndex:5,background:"#475569",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.75rem",fontWeight:900,color:"#fff",boxShadow:"0 2px 10px #47556999"}}>✓</div>
      )}

      {/* Card image */}
      {(() => { const fitContain = card.category==="Flats"||card.category==="Chips"||card.category==="Figures"||card.category==="Misc"||card.category==="Stickers"||card.category==="Thick"; const containBg=card.sub?"#d8e0ee":"#f1f5f9"; return (
      <div style={{aspectRatio:"63/88",overflow:"hidden",position:"relative",background:photo&&fitContain?containBg:ts.bg}}>
        {photo
          ? <img ref={photoImgRef} src={photo} alt="" style={{width:"100%",height:"100%",objectFit:fitContain?"contain":"cover",display:"block",filter:(owned||hideGrayOut)?(isRevHolo?"saturate(1.25) contrast(1.08)":"none"):"saturate(0.20) brightness(0.88) contrast(1.05)"}}/>
          : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",padding:"16%",opacity:(owned||hideGrayOut)?1:0.6,background:ts.bg}}>
              <img src={SCYTHER_ICON} alt="Scyther" style={{width:"100%",height:"100%",objectFit:"contain",imageRendering:"pixelated"}}/>
            </div>
        }
        {isRevHolo && <RevHoloOverlay/>}

          <div style={{position:"absolute",bottom:6,right:6,zIndex:6,

              border:"1px solid rgba(221,214,254,0.5)"}}>
              SPECIAL
            </span>
          </div>
        )}
      </div>
      ); })()}

      {/* Footer */}
      <div style={{padding:"8px 10px 10px",background:"#ffffff",borderTop:`2px solid ${ts.border}`}}>
        {labelEl}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4,gap:4,flexWrap:"wrap",rowGap:4}}>
          {/* Left side: category and number */}
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            {card.category==="Cards (JPN)" ? <JpnIcon size={26}/> : card.category==="Cards (EN)" ? <EnIcon size={26}/> : card.category==="Cameo" ? <CameoIcon size={26}/> : card.category==="Other" ? <OtherIcon size={26}/> : card.category==="Misc" ? <MiscIcon size={26}/> : card.category==="Flats" ? <FlatsIcon size={26}/> : card.category==="Chips" ? <ChipsIcon size={26}/> : card.category==="Figures" ? <FiguresIcon size={26}/> : card.category==="Stickers" ? <StickersIcon size={26}/> : card.category==="Thick" ? <ThickIcon size={26}/> : CATEGORY_META[card.category]?.categoryCode ? <CategoryImg code={CATEGORY_META[card.category].categoryCode} size={20}/> : <span style={{fontSize:"0.88rem"}}>{card.category}</span>}
            <span style={{fontSize:"0.72rem",color:"#94a3b8",fontFamily:"monospace",fontWeight:600}}>{card.set}</span>
            <span style={{fontSize:"0.72rem",color:"#475569",fontFamily:"monospace",fontWeight:600}}>#{card.num}</span>
          </div>

          {/* Right side: condition and price */}
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {condition && (
              <span style={{fontSize:"0.62rem",fontWeight:700,color:condColor,background:condBg,border:`1px solid ${condBorder}`,padding:"1px 6px",borderRadius:4,fontFamily:"monospace"}}>
                {({Mint:"MT",Excellent:"EX",Good:"GD",Played:"PL",Poor:"PO", Ordered: "ORD"}[condition] ?? condition)}
              </span>
            )}
            {!hidePrices && (cardData?.price || card.price) && parseFloat(cardData?.price || card.price) > 0 && (
              <span style={{fontSize:"0.62rem",fontWeight:700,color:"#059669",background:"#d1fae5",border:"1px solid #6ee7b7",padding:"1px 6px",borderRadius:4,fontFamily:"monospace"}}>
                €{parseFloat(cardData?.price || card.price).toFixed(2)}
              </span>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function PhotoLightbox({ srcs, idx, onClose, onPrev, onNext }) {

        <button onClick={e=>{e.stopPropagation();onClose();}} style={{position:"absolute",top:18,right:18,background:"rgba(255,255,255,0.13)",border:"2px solid rgba(255,255,255,0.2)",borderRadius:10,color:"#fff",width:42,height:42,cursor:"pointer",fontSize:"1.15rem",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,backdropFilter:"blur(4px)"}}>{'\u2715'}</button>
        {srcs.length > 1 && <>

          <button onClick={e=>{e.stopPropagation();onNext();}} style={{position:"absolute",right:18,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.13)",border:"2px solid rgba(255,255,255,0.2)",borderRadius:10,color:"#fff",width:50,height:70,cursor:"pointer",fontSize:"2rem",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,backdropFilter:"blur(4px)"}}>{'\u203A'}</button>

function CardModal({ card, cardData, userPhoto, onSave, onPhotoChange, onClose }) {
  const ts = TYPE_STYLE[card.type] || TYPE_STYLE.Regular;
  const fileRef = useRef();
  const isRevHolo = card.type === "Rev Holo";
  const [localOwned,      setLocalOwned]      = useState(cardData?.owned       ?? card.owned ?? false);
  const [localCond,       setLocalCond]       = useState(cardData?.condition   ?? card.condition ?? "");
  const [localPrice,      setLocalPrice]      = useState(cardData?.price       ?? card.price ?? "");
  const [localNote,       setLocalNote]       = useState(cardData?.note       ?? "");
  const [localName,       setLocalName]       = useState(cardData?.name     ?? card.name ?? "");
  const [localUrl,        setLocalUrl]        = useState(cardData?.url     ?? card.url ?? "");
  const [localReleaseDate,setLocalReleaseDate]= useState((d=>(d&&/^\d{4}$/.test(d)?`${d}-01-01`:d))(cardData?.releaseDate ?? card.releaseDate ?? ""));
  const [localIllustration, setLocalIllustration] = useState(cardData?.illustration ?? card.illustration ?? "");
  const [dragOver,        setDragOver]        = useState(false);
  const [photoIdx,        setPhotoIdx]        = useState(0);
  const [confirmDelete,   setConfirmDelete]   = useState(false);
  const [photoHovered,    setPhotoHovered]    = useState(false);
  const [lightboxOpen,    setLightboxOpen]    = useState(false);
  const imgRef = useRef(null);

  // Merge built-in sources (minus any deleted) + user-uploaded photos
  const hiddenBuiltinPhotos = new Set(cardData?.hiddenBuiltinPhotos || []);
  const photoSrcs = [...getPhotoSrcs(card).filter(s=>!hiddenBuiltinPhotos.has(s)), ...getUserPhotoSrcs(userPhoto)];
  const photo = photoSrcs[photoIdx] || null;
  useEffect(()=>{
    if(!lightboxOpen)return;
    document.body.style.overflow="hidden";
    const h=e=>{
      if(e.key==="Escape")setLightboxOpen(false);
      if(e.key==="ArrowLeft")setPhotoIdx(i=>(i-1+photoSrcs.length)%photoSrcs.length);
      if(e.key==="ArrowRight")setPhotoIdx(i=>(i+1)%photoSrcs.length);
    };
    window.addEventListener("keydown",h);
    return()=>{document.body.style.overflow="";window.removeEventListener("keydown",h);};
  },[lightboxOpen,photoSrcs.length]);

  function deleteCurrentPhoto() {
    const src = photoSrcs[photoIdx];
    if (!src) return;
    if (src.startsWith('data:')) {
      // Uploaded photo — remove this specific entry from the uploads array
      const newUploads = getUserPhotoSrcs(userPhoto).filter(u => u !== src);
      onPhotoChange(card._id, newUploads.length === 0 ? null : newUploads);
    } else {
      // Built-in photo — persist its path as suppressed in cardData
      const hidden = [...(cardData?.hiddenBuiltinPhotos || []), src];
      onSave(card._id, {hiddenBuiltinPhotos: hidden});
    }
    setPhotoIdx(i => Math.max(0, i - 1));
    setConfirmDelete(false);
  }

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = ev => onPhotoChange(card._id, ev.target.result);
    r.readAsDataURL(file);
  }

  function save() {
    onSave(card._id,{owned:localOwned,condition:localCond,price:localPrice,note:localNote,

              </span>
              <span style={{fontSize:"0.95rem",color:"#64748b",fontFamily:"monospace",fontWeight:700}}>{card.set} <span style={{color:ts.accent}}>#{card.num}</span></span>
            </div>

        <div style={{display:"flex",maxHeight:"78vh",overflowY:"auto"}}>

              onMouseEnter={()=>setPhotoHovered(true)}
              onMouseLeave={()=>setPhotoHovered(false)}
              style={{cursor:"default",borderRadius:10,overflow:"hidden",aspectRatio:"63/88",

                background:photo&&(card.category==="Flats"||card.category==="Chips"||card.category==="Figures"||card.category==="Misc")?(card.sub?"#d8e0ee":"#f1f5f9"):ts.bg,position:"relative"}}>
              {photo

                    width:30,height:30,cursor:"pointer",display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:"0.95rem",lineHeight:1,
                    boxShadow:"0 1px 5px rgba(220,38,38,0.35)",
                    opacity:photoHovered?1:0,pointerEvents:photoHovered?"auto":"none",
                    transition:"opacity 0.15s"}}>🗑️</button>
              )}
              {/* Confirmation overlay */}
              {confirmDelete && (
                <div onClick={e=>e.stopPropagation()}
                  style={{position:"absolute",inset:0,zIndex:13,background:"rgba(0,0,0,0.68)",
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{color:"#fff",fontFamily:"monospace",fontSize:"0.72rem",fontWeight:700,textAlign:"center",padding:"0 12px"}}>Delete this photo?</span>

                      width:30,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",

                    ))}

            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
            <button onClick={()=>fileRef.current.click()} style={{padding:"7px",background:ts.pill,border:`1.5px solid ${ts.border}`,borderRadius:8,color:ts.text,fontSize:"0.7rem",cursor:"pointer",fontFamily:"monospace",fontWeight:700}}>📷 Upload photo</button>
            <div>
              <div style={LBL}>Illustration</div>
              <select value={localIllustration} onChange={e=>setLocalIllustration(e.target.value)}

          <div style={{flex:1,padding:"1.1rem",display:"flex",flexDirection:"column",gap:11,background:"#ffffff"}}>
            <button onClick={()=>setLocalOwned(v=>!v)} style={{width:"100%",padding:"0.6rem",borderRadius:9,border:`2px solid ${localOwned?ts.accent:"#e2e8f0"}`,background:localOwned?ts.pill:"#f8fafc",color:localOwned?ts.text:"#475569",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.88rem",cursor:"pointer",transition:"all 0.18s"}}>
              {localOwned?"✓  Owned":"Mark as Owned"}

            <div>

                        border:`1.5px solid ${active?COND_BORDER[c]:"#e2e8f0"}`,

                        color:active?COND_COLORS[c]:"#475569",

            <div>

            <div>

            </div>

            <div>
              <label style={LBL}>Release Date</label>
              <input type="date" value={localReleaseDate} onChange={e=>setLocalReleaseDate(e.target.value)} style={{...INP,color:localReleaseDate?"#0f172a":"#94a3b8",colorScheme:"light"}}/>
            </div>

            <div>
              <label style={LBL}>Set Page URL</label>
              <input value={localUrl} onChange={e=>setLocalUrl(e.target.value)} placeholder="https://…" style={INP}/>
            </div>

            <div>
              <label style={LBL}>note</label>
              <textarea value={localNote} onChange={e=>setLocalNote(e.target.value)} rows={3} style={{...INP,resize:"none",lineHeight:1.6}}/>
            </div>

            <button onClick={save} style={{marginTop:"auto",padding:"0.65rem",borderRadius:10,border:`2px solid ${ts.accent}`,background:ts.pill,color:ts.text,fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.9rem",cursor:"pointer",letterSpacing:"0.03em",transition:"all 0.18s"}}
              onMouseEnter={e=>{e.currentTarget.style.background=ts.bg;}}
              onMouseLeave={e=>{e.currentTarget.style.background=ts.pill;}}>
              Save
            </button>
          </div>
        </div>
      </div>
      {lightboxOpen && <PhotoLightbox srcs={photoSrcs} idx={photoIdx} onClose={()=>setLightboxOpen(false)} onPrev={()=>setPhotoIdx(i=>(i-1+photoSrcs.length)%photoSrcs.length)} onNext={()=>setPhotoIdx(i=>(i+1)%photoSrcs.length)}/>}
    </div>
  );
}

function App() {
  const [cardDataMap, setCardDataMap] = useState({});
  const [userPhotos,  setUserPhotos]  = useState({});
  const [cardOrder,   setCardOrder]   = useState(null);
  const [activeCategory, setActiveCategory]         = useState(()=>localStorage.getItem("scyther-active-category")||"ALL");
  const [search,      setSearch]      = useState(()=>localStorage.getItem("scyther-search")||"");
  const [filterType,  setFilterType]  = useState(()=>localStorage.getItem("scyther-filter-type")||"All");
  const [filterOwned, setFilterOwned] = useState(()=>localStorage.getItem("scyther-filter-owned")||"All");
  const [filterCond,  setFilterCond]  = useState(()=>localStorage.getItem("scyther-filter-cond")||"All");
  const [filterIllustration, setFilterIllustration] = useState(()=>localStorage.getItem("scyther-filter-illustration")||"All");
  const [sortBy,      setSortBy]      = useState(()=>localStorage.getItem("scyther-sort-by")||"default");
  const [hidePrices,  setHidePrices]  = useState(()=>localStorage.getItem("scyther-hide-prices")==="1");
  const [hideGrayOut,setHideGrayOut]=useState(()=>localStorage.getItem("scyther-hide-gray-out")==="1");
  const [reorderMode, setReorderMode] = useState(false);
  const [selectedCard,setSelectedCard]= useState(null);
  const [loading,     setLoading]     = useState(true);
  const [draggingId,  setDraggingId]  = useState(null);
  const dragOverId = useRef(null);
  const [hiddenCategories,  setHiddenCategories]  = useState(new Set([]));
  const [collapsedSubs, setCollapsedSubs] = useState(new Set());
  const toggleSub = useCallback((sub)=>{setCollapsedSubs(prev=>{const n=new Set(prev);n.has(sub)?n.delete(sub):n.add(sub);return n;});},[]);
  const setHiddenCategoriesAndPersist = useCallback((updater)=>{
    setHiddenCategories(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      storage.set("scyther-hidden-categories-v6",JSON.stringify([...next])).catch(()=>{});
      return next;
    });
  },[]);
  const [categoryDropOpen, setCategoryDropOpen] = useState(false);
  const [resourceDropOpen, setResourceDropOpen] = useState(false);
  const categoryDropRef = useRef(null);
  const resourceDropRef = useRef(null);

  const baseCards = useMemo(()=>RAW_CARDS.map((c,i)=>({...c,_id:cardId(c,i)})),[]);

  useEffect(()=>{
    async function load(){
      let stored={};
      try{const r=await storage.get("scyther-data-v6");if(r)stored=JSON.parse(r.value);}catch(_){}
      const merged={...stored};
      for(const card of baseCards){
        if(!merged[card._id]&&(card.condition||card.note||card.url)){const init=getInitData(card);if(init)merged[card._id]=init;}
        else if(merged[card._id]&&card.note&&merged[card._id].note==null){merged[card._id]={...merged[card._id],note:card.note};}
        if(merged[card._id]&&card.url&&merged[card._id].url==null){merged[card._id]={...merged[card._id],url:card.url};}
      }
      setCardDataMap(merged);
      try{const r=await storage.get("scyther-photos-v6");if(r)setUserPhotos(JSON.parse(r.value));}catch(_){}
      try{const r=await storage.get("scyther-order-v6");if(r)setCardOrder(JSON.parse(r.value));}catch(_){}
      try{const r=await storage.get("scyther-hidden-categories-v6");if(r)setHiddenCategories(new Set(JSON.parse(r.value)));}catch(_){}
      setLoading(false);
    }
    load();
  },[]);

  const saveCardData = useCallback((id,data)=>{
    setCardDataMap(prev=>{
      const next={...prev,[id]:{...(prev[id]||{}),...data}};
      storage.set("scyther-data-v6",JSON.stringify(next)).catch(()=>{});
      return next;
    });
  },[]);

  const setUserPhoto = useCallback((id,url)=>{
    setUserPhotos(prev=>{
      const next={...prev};
      if(url===null){
        delete next[id];                                    // clear all uploads
      } else if(Array.isArray(url)){
        if(url.length===0) delete next[id]; else next[id]=url; // replace array (used for individual deletion)
      } else {
        const existing=prev[id];                            // append new upload
        const arr=Array.isArray(existing)?existing:(existing?[existing]:[]);
        next[id]=[...arr,url];
      }
      storage.set("scyther-photos-v6",JSON.stringify(next)).catch(()=>{});
      return next;
    });
  },[]);

  useEffect(()=>{
    if(!categoryDropOpen && !resourceDropOpen) return;
    function handler(e){
      if(categoryDropOpen && categoryDropRef.current && !categoryDropRef.current.contains(e.target)) setCategoryDropOpen(false);
      if(resourceDropOpen && resourceDropRef.current && !resourceDropRef.current.contains(e.target)) setResourceDropOpen(false);
    }
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[categoryDropOpen,resourceDropOpen]);

  useEffect(()=>{localStorage.setItem("scyther-hide-prices",hidePrices?"1":"0");},[hidePrices]);
  useEffect(()=>{localStorage.setItem("scyther-hide-gray-out",hideGrayOut?"1":"0");},[hideGrayOut]);
  useEffect(()=>{localStorage.setItem("scyther-active-category",activeCategory);},[activeCategory]);
  useEffect(()=>{localStorage.setItem("scyther-search",search);},[search]);
  useEffect(()=>{localStorage.setItem("scyther-filter-type",filterType);},[filterType]);
  useEffect(()=>{localStorage.setItem("scyther-filter-owned",filterOwned);},[filterOwned]);
  useEffect(()=>{localStorage.setItem("scyther-filter-cond",filterCond);},[filterCond]);
  useEffect(()=>{localStorage.setItem("scyther-filter-illustration",filterIllustration);},[filterIllustration]);
  useEffect(()=>{localStorage.setItem("scyther-sort-by",sortBy);},[sortBy]);

  const orderedCards = useMemo(()=>{
    if(!cardOrder) return baseCards;
    const idx={};cardOrder.forEach((id,i)=>{idx[id]=i;});
    return [...baseCards].sort((a,b)=>(idx[a._id]??99999)-(idx[b._id]??99999));
  },[baseCards,cardOrder]);

  const allCategories = useMemo(()=>{
    const s=new Set(baseCards.map(c=>c.category));
    return CATEGORY_ORDER.filter(l=>s.has(l)).concat([...s].filter(l=>!CATEGORY_ORDER.includes(l)));
  },[baseCards]);

  const categoryFilteredBase = useMemo(()=>
    hiddenCategories.size===0 ? baseCards : baseCards.filter(c=>!hiddenCategories.has(c.category))
  ,[baseCards,hiddenCategories]);

  const allTypes = useMemo(()=>{
    const typeOrder = ["Regular","Rev Holo","First Ed","Holo","Special"];
    const uniqueTypes = [...new Set(baseCards.map(c=>c.type))];
    const orderedTypes = typeOrder.filter(t=>uniqueTypes.includes(t));
    const otherTypes = uniqueTypes.filter(t=>!typeOrder.includes(t));
    return ["All",...orderedTypes,...otherTypes];
  },[baseCards]);

  const visibleCards = useMemo(()=>{
    let cards=orderedCards.filter(c=>{
      if(activeCategory!=="ALL"&&c.category!==activeCategory) return false;
      if(hiddenCategories.size>0&&hiddenCategories.has(c.category)) return false;
      if(filterType!=="All"&&c.type!==filterType) return false;
      const cd=cardDataMap[c._id];
      if(filterOwned==="Owned"&&!(cd?.owned ?? c.Owned)) return false;
      if(filterOwned==="Unowned"&&(cd?.owned ?? c.Owned)) return false;
      if(filterCond!=="All"&&(cd?.condition ?? c.Condition ?? "")!==filterCond) return false;
      if(filterIllustration!=="All"){
        const illustrationKey = cd?.illustration !== undefined ? cd.illustration : (c.illustration || "");
        if(filterIllustration==="none"){
          // Show cards without an Illustration value OR with an invalid illustration key
          // Exclude special categories that never have illustrations
          if(c.category==="Cameo"||c.category==="Cards (JPN)"||c.category==="Cards (EN)"||c.category==="Other"||c.category==="Misc") return false;
          if(illustrationKey && ILLUSTRATIONS[illustrationKey]) return false;
        } else {
          if(illustrationKey !== filterIllustration) return false;
        }
      }
      if(search){const q=search.toLowerCase();const sn=(cd?.name||c.name||"").toLowerCase();const releaseDate=cd?.releaseDate||c.ReleaseDate||"";const yr=releaseDate.substring(0,4);
        if(!c.set.toLowerCase().includes(q)&&!c.num.toLowerCase().includes(q)&&!c.type.toLowerCase().includes(q)&&!c.category.toLowerCase().includes(q)&&!sn.includes(q)&&!yr.includes(q))return false;}
      return true;
    });
    if(sortBy!=="default"){
      cards=[...cards].sort((a,b)=>{
        const da=cardDataMap[a._id],db=cardDataMap[b._id];
        if(sortBy==="price-asc"||sortBy==="price-desc"){
          const pa=(parseFloat(da?.price ?? a.Price ?? "0")||0),pb=(parseFloat(db?.price ?? b.Price ?? "0")||0);
          // Cards without prices should always go to the end
          if(pa===0&&pb===0)return 0;
          if(pa===0)return 1; // a goes after b
          if(pb===0)return -1; // b goes after a
          return sortBy==="price-asc"?pa-pb:pb-pa;
        }
        if(sortBy==="date-asc"||sortBy==="date-desc"){
          const ra=da?.releaseDate ?? a.ReleaseDate ?? "",rb=db?.releaseDate ?? b.ReleaseDate ?? "";
          if(!ra&&!rb)return 0;if(!ra)return 1;if(!rb)return -1;
          return sortBy==="date-asc"?ra.localeCompare(rb):rb.localeCompare(ra);
        }
        return 0;
      });
    }
    return cards;
  },[orderedCards,activeCategory,hiddenCategories,filterType,filterOwned,filterCond,filterIllustration,search,sortBy,cardDataMap,userPhotos]);

  const segments = useMemo(()=>{
    if(sortBy!=="default") return visibleCards.map(card=>({type:'card',card}));
    const subGroups={};
    for(const card of visibleCards){if(card.sub){if(!subGroups[card.sub])subGroups[card.sub]=[];subGroups[card.sub].push(card);}}
    const seen=new Set();const result=[];
    for(const card of visibleCards){
      if(card.sub){if(!seen.has(card.sub)){seen.add(card.sub);result.push({type:'group',sub:card.sub,cards:subGroups[card.sub]});}}
      else{result.push({type:'card',card});}
    }
    return result;
  },[visibleCards,sortBy]);

  const visibleValue = useMemo(()=>
    visibleCards.reduce((sum,c)=>{
      const p=parseFloat(cardDataMap[c._id]?.price||c.Price||0);
      return sum+(isNaN(p)?0:p);
    },0)
  ,[visibleCards,cardDataMap]);

  const stats = useMemo(()=>{
    const total=categoryFilteredBase.length;
    const ownedCount=categoryFilteredBase.filter(c=>(cardDataMap[c._id]?.owned ?? c.Owned) && (cardDataMap[c._id]?.condition ?? c.Condition)!=="Ordered").length;
    const orderedCount=categoryFilteredBase.filter(c=>(cardDataMap[c._id]?.condition ?? c.Condition)==="Ordered").length;
    const ownedValue=categoryFilteredBase.reduce((s,c)=>{
      if(!(cardDataMap[c._id]?.owned ?? c.Owned))return s;
      if((cardDataMap[c._id]?.condition ?? c.Condition)==="Ordered")return s;
      const p=parseFloat(cardDataMap[c._id]?.price ?? c.Price ?? "0");return isNaN(p)?s:s+p;
    },0);
    const orderedValue=categoryFilteredBase.reduce((s,c)=>{
      if((cardDataMap[c._id]?.condition ?? c.Condition)!=="Ordered")return s;
      const p=parseFloat(cardDataMap[c._id]?.price ?? c.Price ?? "0");return isNaN(p)?s:s+p;
    },0);
    const totalValue=ownedValue+orderedValue;
    return {total,ownedCount,orderedCount,ownedValue,orderedValue,totalValue};
  },[categoryFilteredBase,cardDataMap]);

  const categoryStats = useMemo(()=>{
    const m={};for(const c of categoryFilteredBase){
      if(!m[c.category])m[c.category]={total:0,owned:0};m[c.category].total++;
      const cd=cardDataMap[c._id];
      if((cd?.owned ?? c.Owned) || (cd?.condition ?? c.Condition)==="Ordered")m[c.category].owned++;
    }return m;
  },[categoryFilteredBase,cardDataMap]);

  function handleDragStart(e,card){if(!reorderMode)return;setDraggingId(card._id);e.dataTransfer.effectAllowed="move";}
  function handleDragEnter(card){if(!reorderMode)return;dragOverId.current=card._id;}
  function handleDragEnd(){
    if(!reorderMode||!draggingId||!dragOverId.current||draggingId===dragOverId.current){setDraggingId(null);dragOverId.current=null;return;}
    const ids=orderedCards.map(c=>c._id);
    const fi=ids.indexOf(draggingId),ti=ids.indexOf(dragOverId.current);
    if(fi===-1||ti===-1){setDraggingId(null);dragOverId.current=null;return;}
    const next=[...ids];next.splice(fi,1);next.splice(ti,0,draggingId);
    setCardOrder(next);storage.set("scyther-order-v6",JSON.stringify(next)).catch(()=>{});
    setDraggingId(null);dragOverId.current=null;
  }

  // Vertical separator between filter groups
  const SEP = () => (
    <span style={{display:"inline-flex",alignItems:"center",color:"#cbd5e1",fontSize:"1.1rem",
      userSelect:"none",flexShrink:0,margin:"0 2px",fontWeight:300,lineHeight:1}}>|</span>
  );

  if(loading) return(
    <div style={{height:"100vh",background:"#f8fafc",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:18}}>
      <img src={SCYTHER_ICON} alt="" style={{width:88,imageRendering:"pixelated"}}/>
      <div style={{fontSize:"0.82rem",letterSpacing:"0.2em",textTransform:"uppercase",color:"#64748b",fontFamily:"monospace",fontWeight:700}}>Loading…</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'JetBrains Mono',monospace;background:#f1f5f9;}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:#f1f5f9}
        ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        input,textarea,button,select{font-family:'JetBrains Mono',monospace;outline:none;}
        input[type=number]::-webkit-inner-spin-button{opacity:0.4}
        .category-tab{border:none;background:transparent;cursor:pointer;transition:all 0.15s;}
        .category-tab:hover{background:#f1f5f9!important;}
        .chip{border:none;cursor:pointer;transition:all 0.15s;}
        .chip:hover{opacity:0.75;}
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;}
        @media(min-width:640px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:16px;}}
        @media(min-width:1024px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px;}}
        .drag-target{outline:3px dashed #3b82f6!important;outline-offset:3px;border-radius:14px;}
        .sub-group-header{border:none;background:none;cursor:pointer;width:100%;display:flex;align-items:center;gap:8px;padding:0.3rem 0;text-align:left;}
        select option{background:#fff;color:#0f172a;}
        input:focus,textarea:focus,select:focus{border-color:#3b82f6!important;box-shadow:0 0 0 3px rgba(59,130,246,0.14)!important;}
      `}</style>

      {/* ── HEADER — scrolls away ── */}
      <header style={{background:"rgba(255,255,255,0.97)",borderBottom:"2px solid #e2e8f0",boxShadow:"0 2px 12px rgba(0,0,0,0.07)",position:"relative",zIndex:100}}>
          <div style={{maxWidth:1700,margin:"0 auto",padding:"1rem 1.75rem",display:"flex",alignItems:"flex-start",gap:"1rem"}}>
          
          {/* ── Top-right button cluster: Resources + Reorder ── */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"stretch",gap:6,position:"absolute",right:"1.75rem",top:"1rem"}}>

            <div style={{display:"flex",flexDirection:"row",alignItems:"flex-start",gap:8}}>

            {/* Resources button + dropdown */}
            <div ref={resourceDropRef} style={{position:"relative"}}>
              <button onClick={()=>setResourceDropOpen(v=>!v)}
                style={{padding:"0.42rem 1.1rem",borderRadius:9,fontFamily:"monospace",cursor:"pointer",transition:"all 0.18s",border:`2px solid ${resourceDropOpen?"#0891b2":"#e2e8f0"}`,background:resourceDropOpen?"#ecfeff":"#f8fafc",color:resourceDropOpen?"#0e7490":"#475569",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,whiteSpace:"nowrap"}}>
                <span style={{fontSize:"1.2rem",lineHeight:1}}>🔗</span>
                <span style={{fontSize:"0.56rem",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,color:resourceDropOpen?"#0e7490":"#6b7280",marginTop:2}}>resources</span>
              </button>
              {resourceDropOpen&&(
                <div style={{position:"absolute",top:"calc(100% + 8px)",right:0,background:"#1e293b",border:"1.5px solid #334155",borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",minWidth:200,zIndex:200,overflow:"hidden"}}>
                  <div style={{padding:"0.6rem 0.85rem",borderBottom:"1.5px solid #334155"}}>
                    <span style={{fontSize:"0.65rem",color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,fontFamily:"monospace"}}>Resources</span>
                  </div>
                  <div style={{padding:"0.35rem 0"}}>
                    {Object.entries(RESOURCE_URLS).map(([label,url])=>(
                      <a key={label} href={url} target="_blank" rel="noreferrer"
                        style={{display:"block",padding:"0.45rem 0.85rem",fontSize:"0.78rem",fontFamily:"monospace",fontWeight:600,color:"#e2e8f0",textDecoration:"none",whiteSpace:"nowrap"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#334155"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        🔗 {label}
                      </a>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Reorder button */}
            <div style={{position:"relative"}}>
              <button onClick={()=>setReorderMode(v=>!v)} style={{padding:"0.42rem 0.9rem",borderRadius:9,border:`2px solid ${reorderMode?"#d97706":"#e2e8f0"}`,background:reorderMode?"#fffbeb":"#f8fafc",color:reorderMode?"#92400e":"#475569",fontFamily:"monospace",cursor:"pointer",transition:"all 0.18s",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <span style={{fontSize:"1.2rem",lineHeight:1}}>{reorderMode?"🔓":"🔒"}</span>
                <span style={{fontSize:"0.56rem",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,color:reorderMode?"#92400e":"#6b7280",marginTop:2}}>reorder</span>
              </button>
              {reorderMode&&<div style={{position:"absolute",top:"calc(100% + 6px)",right:0,fontSize:"0.7rem",color:"#d97706",fontFamily:"monospace",fontWeight:700,whiteSpace:"nowrap"}}>⟺ Drag to reorder</div>}
            </div>
            </div>

            <div ref={categoryDropRef} style={{position:"relative",zIndex:60}}>
              <button onClick={()=>setCategoryDropOpen(v=>!v)} style={{padding:"0.4rem 1rem",borderRadius:9,fontFamily:"monospace",fontSize:"0.75rem",fontWeight:700,cursor:"pointer",transition:"all 0.18s",border:`2px solid ${hiddenCategories.size>0?"#3b82f6":"#e2e8f0"}`,background:hiddenCategories.size>0?"#eff6ff":"#f8fafc",color:hiddenCategories.size>0?"#1e40af":"#475569",display:"flex",alignItems:"center",justifyContent:"center",gap:5,whiteSpace:"nowrap",width:"100%"}}>
                🌐 Categories
                {hiddenCategories.size>0&&<span style={{background:"#3b82f6",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:"0.6rem",fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{allCategories.length-hiddenCategories.size}</span>}
              </button>
              {categoryDropOpen&&(
                <div style={{position:"absolute",top:"calc(100% + 8px)",right:0,background:"#1e293b",border:"1.5px solid #334155",borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",minWidth:220,zIndex:200,overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0.6rem 0.85rem",borderBottom:"1.5px solid #334155"}}>
                    <span style={{fontSize:"0.65rem",color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,fontFamily:"monospace"}}>Categories</span>
                    <div style={{display:"flex",gap:6}}>
                      {[["All",()=>setHiddenCategoriesAndPersist(new Set())],["None",()=>setHiddenCategoriesAndPersist(new Set(allCategories))]].map(([lbl,fn])=>(
                        <button key={lbl} onClick={fn} style={{fontSize:"0.62rem",fontFamily:"monospace",fontWeight:700,padding:"2px 8px",borderRadius:5,cursor:"pointer",background:"#334155",border:"1px solid #475569",color:"#94a3b8"}}>{lbl}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{maxHeight:320,overflowY:"auto",padding:"0.35rem 0",display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                    {allCategories.map(category=>{
                      const hidden=hiddenCategories.has(category);
                      return (
                        <label key={category} style={{display:"flex",alignItems:"center",gap:8,padding:"0.42rem 0.7rem",cursor:"pointer",background:"transparent"}}
                          onMouseEnter={e=>e.currentTarget.style.background="#334155"}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <input type="checkbox" checked={!hidden} style={{width:14,height:14,accentColor:"#3b82f6",cursor:"pointer",flexShrink:0}}
                            onChange={()=>setHiddenCategoriesAndPersist(prev=>{const n=new Set(prev);n.has(category)?n.delete(category):n.add(category);return n;})}/>
                          <span style={{display:"inline-flex",alignItems:"center",flexShrink:0}}><CategoryIcon category={category} size={20}/></span>
                          <span style={{fontSize:"0.73rem",fontFamily:"monospace",fontWeight:600,color:hidden?"#475569":"#e2e8f0",textDecoration:hidden?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            {CATEGORY_META[category]?.label||category}
                          </span>
                        </label>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>


          </div>

          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",columnGap:"2.5rem",rowGap:"0.75rem",flexWrap:"wrap",minWidth:0}}>
            {/* Logo */}
            <div style={{display:"flex",alignItems:"center",gap:"0.5rem",flexShrink:0}}>
              <img src={SCYTHER_ICON} alt="Scyther" style={{width:120,height:120,imageRendering:"pixelated",filter:"drop-shadow(0 3px 8px rgba(5,150,105,0.28))"}}/>
              <div>
                <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.75rem",fontWeight:800,color:"#0f172a",letterSpacing:"-0.025em",lineHeight:1}}>Scyther</h1>
                <p style={{fontSize:"0.75rem",color:"#94a3b8",letterSpacing:"0.16em",textTransform:"uppercase",marginTop:3,fontWeight:700}}>Collection Checklist</p>
              </div>
            </div>

          {/* Progress */}
          <div style={{minWidth:260,maxWidth:440,height:"3.1rem",display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:"0.4rem"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:"0.82rem",color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Progress</span>
              <span style={{fontSize:"0.9rem",color:"#334155",fontFamily:"monospace",fontWeight:700}}>
                {stats.ownedCount+stats.orderedCount} / {stats.total} ({Math.round((stats.ownedCount+stats.orderedCount)/(stats.total||1)*100)}%)
              </span>
            </div>
            <div style={{height:22,background:"#e2e8f0",borderRadius:11,overflow:"hidden",display:"flex",border:"2px solid #cbd5e1"}}>
              <div style={{height:"100%",width:`${stats.ownedCount/(stats.total||1)*100}%`,background:"#34d399",transition:"width 0.6s ease"}}/>
              {stats.orderedCount>0&&<div style={{height:"100%",width:`${stats.orderedCount/(stats.total||1)*100}%`,background:"#fbbf24",transition:"width 0.6s ease"}}/>}
            </div>
          </div>

          {/* Stat pills */}
          <div style={{display:"flex",gap:"0.75rem",flexShrink:0}}>
            <div title={`${Math.round(stats.ownedCount/(stats.total||1)*100)}%`} style={{textAlign:"center",background:"#f0fdf4",border:"2px solid #bbf7d0",borderRadius:11,padding:"0.42rem 1.1rem",cursor:"default"}}>
              <div style={{fontSize:"1.2rem",fontWeight:800,color:"#059669",fontFamily:"monospace",lineHeight:1}}>{stats.ownedCount}</div>
              <div style={{fontSize:"0.56rem",color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:2,fontWeight:700}}>owned</div>
            </div>
            {stats.orderedCount>0&&(
              <div title={`${Math.round(stats.orderedCount/(stats.total||1)*100)}%`} style={{textAlign:"center",background:"#fffbeb",border:"2px solid #fde68a",borderRadius:11,padding:"0.42rem 1.1rem",cursor:"default"}}>
                <div style={{fontSize:"1.2rem",fontWeight:800,color:"#d97706",fontFamily:"monospace",lineHeight:1}}>{stats.orderedCount}</div>
                <div style={{fontSize:"0.56rem",color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:2,fontWeight:700}}>ordered</div>
              </div>
            )}
            {!hidePrices&&(
            <div style={{textAlign:"center",background:"#ecfeff",border:"2px solid #a5f3fc",borderRadius:11,padding:"0.42rem 1.1rem"}}>
              <div style={{fontSize:"1.2rem",fontWeight:800,color:"#0891b2",fontFamily:"monospace",lineHeight:1}}>€{stats.totalValue.toFixed(2)}</div>
              <div style={{fontSize:"0.56rem",color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:2,fontWeight:700}}>spent</div>
            </div>
            )}
          </div>
          </div>
          </div>

      </header>

      {/* ── STICKY BAR: tabs + filter ── */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"#ffffff",boxShadow:"0 2px 12px rgba(0,0,0,0.07)"}}>

        {/* Category tabs */}
        <div style={{display:"flex",alignItems:"center",borderBottom:"1.5px solid #e2e8f0",background:"#fff"}}>
        <div style={{flex:1,display:"flex",justifyContent:"center",overflowX:"auto",padding:"6px 1.75rem 0",minWidth:0}}>
          {[...allCategories.filter(l=>CATEGORY_ORDER.indexOf(l)<=CATEGORY_ORDER.indexOf("S-CH")).map(l=>({category:l,...(CATEGORY_META[l]||{categoryCode:null,label:l})})),{category:"ALL",categoryCode:null},...allCategories.filter(l=>CATEGORY_ORDER.indexOf(l)>CATEGORY_ORDER.indexOf("S-CH")).map(l=>({category:l,...(CATEGORY_META[l]||{categoryCode:null,label:l})}))].filter(({category})=>{
            if(category==="ALL")return true;
            const s=categoryStats[category]||{owned:0,total:0};
            return s.total>0;
          }).map(({category,categoryCode})=>{
            const s=category==="ALL"?{owned:stats.ownedCount+stats.orderedCount,total:stats.total}:(categoryStats[category]||{owned:0,total:0});
            const active=activeCategory===category;
            const hidden=category!=="ALL"&&hiddenCategories.has(category);
            const pct=s.total?Math.round(s.owned/s.total*100):0;
            return(
              <button key={category} className="category-tab"
                onClick={e=>{
                  if(e.ctrlKey||e.metaKey){
                    const url=CATEGORY_URLS[category];
                    if(url){e.preventDefault();window.open(url,"_blank","noopener");}
                    return;
                  }
                  if(e.shiftKey&&category!=="ALL"){
                    setHiddenCategoriesAndPersist(prev=>{const n=new Set(prev);n.has(category)?n.delete(category):n.add(category);return n;});
                  } else {
                    setActiveCategory(category);
                  }
                }}
                title={hidden?`${category} (hidden — shift+click to show)`:`${pct}%`}
                style={{padding:category==="ALL"?"calc(0.4rem + 6px) 1.1rem 0.4rem":"0.4rem 1.1rem",color:active?"#2563eb":hidden?"#cbd5e1":"#475569",borderBottom:`3px solid ${active?"#2563eb":"transparent"}`,display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:68,flexShrink:0,opacity:hidden?0.45:1,transition:"opacity 0.15s",background:category==="ALL"?"#f1f5f9":"transparent",borderLeft:category==="ALL"?"2px solid #e2e8f0":"none",borderRight:category==="ALL"?"2px solid #e2e8f0":"none",borderRadius:0,margin:category==="ALL"?"-6px 5px 0":0}}>
                <span style={{fontSize:"1.05rem",lineHeight:1,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
                  {category==="ALL" ? "🌐" : category==="Cards (JPN)" ? <JpnIcon size={26}/> : category==="Cards (EN)" ? <EnIcon size={26}/> : category==="Cameo" ? <CameoIcon size={26}/> : category==="Other" ? <OtherIcon size={26}/> : category==="Misc" ? <MiscIcon size={26}/> : category==="Flats" ? <FlatsIcon size={26}/> : category==="Chips" ? <ChipsIcon size={26}/> : category==="Figures" ? <FiguresIcon size={26}/> : category==="Stickers" ? <StickersIcon size={26}/> : category==="Thick" ? <ThickIcon size={26}/> : categoryCode ? <CategoryImg code={categoryCode} size={20}/> : category}
                </span>
                <span style={{fontSize:"0.78rem",fontWeight:active?800:500,letterSpacing:"0.03em"}}>{category==="ALL"?"ALL":category}</span>
                {s.owned>0&&<span style={{fontSize:"0.62rem",color:active?"#2563eb":"#94a3b8",fontFamily:"monospace",fontWeight:600}}>{`${s.owned}/${s.total}`}</span>}
              </button>
            );
          })}
        </div>{/* end scrollable tabs */}
        </div>{/* end categories outer wrapper */}

      {/* ── FILTER BAR ── */}
      <div style={{background:"#ffffff",borderBottom:"2px solid #e2e8f0",padding:"0.72rem 1.75rem",boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
        <div style={{maxWidth:1700,margin:"0 auto",display:"flex",alignItems:"center",gap:"0.75rem",flexWrap:"wrap"}}>
          <div style={{flex:1,display:"flex",gap:"0.55rem",alignItems:"center",flexWrap:"wrap",justifyContent:"center",minWidth:0}}>

          {/* Clear filters */}
          {(search||filterType!=="All"||filterOwned!=="All"||filterCond!=="All"||filterIllustration!=="All"||sortBy!=="default")&&(
            <button onClick={()=>{setSearch("");setFilterType("All");setFilterOwned("All");setFilterCond("All");setFilterIllustration("All");setSortBy("default");}}
              style={{padding:"0.38rem 0.75rem",borderRadius:8,border:"1.5px solid #fca5a5",background:"#fff1f2",color:"#dc2626",fontSize:"0.75rem",fontFamily:"monospace",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="#fee2e2";}}
              onMouseLeave={e=>{e.currentTarget.style.background="#fff1f2";}}>
              ✕ Clear
            </button>
          )}

          {/* Search */}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
            style={{width:150,padding:"0.38rem 0.75rem",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:8,color:"#0f172a",fontSize:"0.78rem",fontWeight:600}}/>

          <SEP/>

          {/* Owned */}
          <select value={filterOwned} onChange={e=>setFilterOwned(e.target.value)}
            style={{padding:"0.34rem 0.7rem",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:8,
              color:filterOwned==="All"?"#94a3b8":"#0f172a",fontSize:"0.75rem",cursor:"pointer",fontWeight:filterOwned==="All"?500:700}}>
            <option value="All">Owned: All</option>
            <option value="Owned">Owned</option>
            <option value="Unowned">Unowned</option>
          </select>

          <SEP/>

          {/* Type */}
          <select value={filterType} onChange={e=>setFilterType(e.target.value)}
            style={{padding:"0.34rem 0.7rem",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:8,
              color:filterType==="All"?"#94a3b8":"#0f172a",fontSize:"0.75rem",cursor:"pointer",fontWeight:filterType==="All"?500:700}}>
            {allTypes.map(t=><option key={t} value={t}>{t==="All"?"Type: All":t}</option>)}
          </select>

          <SEP/>

          {/* Illustration */}
          <select value={filterIllustration} onChange={e=>setFilterIllustration(e.target.value)}
            style={{padding:"0.34rem 0.7rem",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:8,
              color:filterIllustration==="All"?"#94a3b8":"#0f172a",fontSize:"0.75rem",cursor:"pointer",fontWeight:filterIllustration==="All"?500:700}}>
            <option value="All">Illustration: All</option>
            <option value="none">No Illustration</option>
            {Object.entries(ILLUSTRATIONS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>

          <SEP/>

          {/* Condition */}
          <select value={filterCond} onChange={e=>setFilterCond(e.target.value)}
            style={{padding:"0.34rem 0.7rem",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:8,
              color:filterCond==="All"?"#94a3b8":"#0f172a",fontSize:"0.75rem",cursor:"pointer",fontWeight:filterCond==="All"?500:700}}>
            {["All",...CONDITIONS].map(c=><option key={c} value={c}>{c==="All"?"Condition: All":c}</option>)}
          </select>

          <SEP/>

          {/* Sort */}
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
            style={{padding:"0.34rem 0.7rem",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:8,
              color:sortBy==="default"?"#94a3b8":"#0f172a",fontSize:"0.75rem",cursor:"pointer",fontWeight:sortBy==="default"?500:700}}>
            <option value="default">Sort</option>
            <option value="price-asc">Price ↑</option>
            <option value="price-desc">Price ↓</option>
            <option value="date-asc">Date ↑ (oldest)</option>
            <option value="date-desc">Date ↓ (newest)</option>
          </select>

          <span style={{fontSize:"0.85rem",color:"#94a3b8",fontFamily:"monospace",fontWeight:700,marginLeft:2}}>{visibleCards.length} cards</span>
          {!hidePrices&&visibleValue>0&&<span style={{fontSize:"0.85rem",color:"#059669",fontFamily:"monospace",fontWeight:700}}>· €{visibleValue.toFixed(2)}</span>}

          </div>{/* end filter controls */}

          {/* Checkboxes — right side */}
          <div style={{display:"flex",gap:14,alignItems:"center",flexShrink:0}}>
            <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:"0.75rem",fontFamily:"monospace",fontWeight:700,color:hideGrayOut?"#0f172a":"#94a3b8",userSelect:"none"}}>
              <input type="checkbox" checked={hideGrayOut} onChange={e=>setHideGrayOut(e.target.checked)} style={{width:14,height:14,cursor:"pointer",accentColor:"#0891b2"}}/>
              Hide Gray Out
            </label>
            <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:"0.75rem",fontFamily:"monospace",fontWeight:700,color:hidePrices?"#0f172a":"#94a3b8",userSelect:"none"}}>
              <input type="checkbox" checked={hidePrices} onChange={e=>setHidePrices(e.target.checked)} style={{width:14,height:14,cursor:"pointer",accentColor:"#0891b2"}}/>
              Hide Prices
            </label>
          </div>

        </div>{/* end maxWidth */}
      </div>
      </div>{/* end sticky bar */}

      {/* ── GRID ── */}
      <main style={{maxWidth:1700,margin:"0 auto",padding:"1.75rem"}}>
        {visibleCards.length===0
          ?<div style={{textAlign:"center",padding:"6rem",display:"flex",flexDirection:"column",alignItems:"center",gap:24}}>
              <img src={SCYTHER_ICON} alt="" style={{width:72,imageRendering:"pixelated",opacity:0.3}}/>
              <span style={{fontSize:"0.95rem",color:"#94a3b8",fontFamily:"monospace",fontWeight:600}}>No cards match your filters.</span>
            </div>
          :<div className="card-grid">
              {segments.map((seg)=>{
                if(seg.type==='card'){
                  const card=seg.card;
                  return(
                    <div key={card._id}
                      draggable={reorderMode}
                      onDragStart={e=>handleDragStart(e,card)}
                      onDragEnter={()=>handleDragEnter(card)}
                      onDragEnd={handleDragEnd}
                      onDragOver={e=>e.preventDefault()}
                      className={reorderMode&&draggingId&&draggingId!==card._id&&dragOverId.current===card._id?"drag-target":""}
                      style={{cursor:reorderMode?"grab":"default"}}>
                      <CardTile card={card} cardData={cardDataMap[card._id]} userPhoto={userPhotos[card._id]||null}
                        onOpen={reorderMode?()=>{}:setSelectedCard} onSave={saveCardData} isDragging={draggingId===card._id}
                        hidePrices={hidePrices} hideGrayOut={hideGrayOut}/>
                    </div>
                  );
                }
                const isCollapsed=collapsedSubs.has(seg.sub);
                return(
                  <div key={`group-${seg.sub}`} style={{gridColumn:'1/-1',background:'#d8e0ee',borderRadius:14,padding:'1rem 1.1rem 1.1rem',marginBottom:4}}>
                    <button className="sub-group-header" onClick={()=>toggleSub(seg.sub)} style={{marginBottom:isCollapsed?0:14}}>
                      <span style={{fontSize:'0.8rem',color:'#64748b',transition:'transform 0.2s',display:'inline-block',transform:isCollapsed?'rotate(-90deg)':'rotate(0deg)',lineHeight:1}}>▼</span>
                      <span style={{display:'inline-flex',alignItems:'center',gap:7,background:'#b8c4d8',borderRadius:8,padding:'3px 10px 3px 8px'}}>
                        <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:'0.95rem',color:'#1e293b',letterSpacing:'0.01em'}}>{seg.sub}</span>
                        <span style={{fontSize:'0.78rem',color:'#334155',fontFamily:'monospace',fontWeight:700}}>({seg.cards.length})</span>
                      </span>
                      {isCollapsed&&<span style={{fontSize:'0.72rem',color:'#64748b',fontFamily:'monospace'}}>· hidden</span>}
                    </button>
                    {!isCollapsed&&(
                      <div className="card-grid">
                        {seg.cards.map(card=>(
                          <div key={card._id}
                            draggable={reorderMode}
                            onDragStart={e=>handleDragStart(e,card)}
                            onDragEnter={()=>handleDragEnter(card)}
                            onDragEnd={handleDragEnd}
                            onDragOver={e=>e.preventDefault()}
                            className={reorderMode&&draggingId&&draggingId!==card._id&&dragOverId.current===card._id?"drag-target":""}
                            style={{cursor:reorderMode?"grab":"default"}}>
                            <CardTile card={card} cardData={cardDataMap[card._id]} userPhoto={userPhotos[card._id]||null}
                              onOpen={reorderMode?()=>{}:setSelectedCard} onSave={saveCardData} isDragging={draggingId===card._id}
                              hidePrices={hidePrices} hideGrayOut={hideGrayOut}/>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
        }
      </main>

      {selectedCard&&(
        <CardModal card={selectedCard} cardData={cardDataMap[selectedCard._id]}
          userPhoto={userPhotos[selectedCard._id]||null}
          onSave={saveCardData} onPhotoChange={setUserPhoto} onClose={()=>setSelectedCard(null)}/>
      )}
    </div>
  );
}
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
